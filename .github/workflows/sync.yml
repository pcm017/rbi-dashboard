name: Sync RBI ATM Data

on:
  schedule:
    - cron: '0 6 5 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit new data files
        run: |
          git config user.name  "rbi-bot"
          git config user.email "rbi-bot@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: sync RBI ATM data $(date +'%Y-%m')"
          git push
